<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عجلة الحظ التفاعلية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Winwheel/2.7.0/Winwheel.min.js"></script>
    <style>
        body { text-align: center; background: #efebe9; font-family: sans-serif; padding: 10px; }
        .input-box { margin-bottom: 20px; }
        textarea { width: 80%; height: 60px; padding: 10px; border-radius: 8px; border: 1px solid #8d6e63; }
        canvas { background-color: #8d6e63; border-radius: 50%; border: 5px solid #3e2723; margin-top: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #3e2723; color: white; border: none; border-radius: 5px; margin: 5px; }
    </style>
</head>
<body>

    <h1>عجلة الحظ - أضف أسماءك</h1>

    <div class="input-box">
        <textarea id="input1" placeholder="اكتب الأسماء هنا مفصولة بفاصلة (مثال: أحمد,سارة,علي)"></textarea><br>
        <button onclick="updateWheel(wheel1, 'input1')">تحديث وحفظ العجلة 1</button>
        <br>
        <canvas id="canvas1" width="250" height="250"></canvas>
        <br><button onclick="wheel1.startAnimation()">دوّر العجلة 1</button>
    </div>

    <hr>

    <div class="input-box">
        <textarea id="input2" placeholder="اكتب الأسماء هنا مفصولة بفاصلة (مثال: خيار1,خيار2)"></textarea><br>
        <button onclick="updateWheel(wheel2, 'input2')">تحديث وحفظ العجلة 2</button>
        <br>
        <canvas id="canvas2" width="250" height="250"></canvas>
        <br><button onclick="wheel2.startAnimation()">دوّر العجلة 2</button>
    </div>

    <script>
        function createWheel(id) {
            return new Winwheel({
                'canvasId': id,
                'numSegments': 1,
                'segments': [{'fillStyle': '#a1887f', 'text': 'ابدأ'}]
            });
        }

        let wheel1 = createWheel("canvas1");
        let wheel2 = createWheel("canvas2");

        function updateWheel(wheel, inputId) {
            let text = document.getElementById(inputId).value;
            let names = text.split(',').map(name => name.trim());
            
            wheel.segments = []; // مسح القديم
            names.forEach(name => {
                wheel.addSegment({'fillStyle': '#a1887f', 'text': name}, null);
            });
            wheel.draw();
        }
    </script>
</body>
</html>
