<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عجلة الحظ البسيطة</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #efebe9; }
        .box { margin: 20px; border: 2px solid #5d4037; padding: 15px; display: inline-block; border-radius: 15px; }
        canvas { background: #8d6e63; border-radius: 50%; border: 5px solid #3e2723; }
        textarea { display: block; width: 250px; height: 50px; margin: 10px auto; }
        button { padding: 10px 20px; cursor: pointer; background: #3e2723; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>عجلة الحظ</h1>

    <div class="box">
        <textarea id="list1" placeholder="أدخل الأسماء هنا، مفصولة بـ (،)"></textarea>
        <button onclick="updateWheel('canvas1', 'list1')">حفظ وتحديث</button>
        <canvas id="canvas1" width="250" height="250"></canvas>
    </div>

    <script>
        function updateWheel(canvasId, inputId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext("2d");
            const names = document.getElementById(inputId).value.split('،').filter(n => n.trim() !== "");
            
            if (names.length === 0) return;

            // مسح العجلة
            ctx.clearRect(0, 0, 250, 250);
            
            // رسم بسيط للأسماء
            const angle = (2 * Math.PI) / names.length;
            names.forEach((name, i) => {
                ctx.beginPath();
                ctx.moveTo(125, 125);
                ctx.arc(125, 125, 120, i * angle, (i + 1) * angle);
                ctx.fillStyle = i % 2 === 0 ? "#795548" : "#5d4037";
                ctx.fill();
                ctx.stroke();
                
                // كتابة النص
                ctx.fillStyle = "white";
                ctx.font = "16px Arial";
                ctx.save();
                ctx.translate(125, 125);
                ctx.rotate(i * angle + angle / 2);
                ctx.fillText(name, 50, 5);
                ctx.restore();
            });
            alert("تم حفظ الأسماء وتحديث العجلة!");
        }
    </script>
</body>
</html>
